name: Daily Briefing

on:
  schedule:
    - cron: '0 15 * * *'  # 8am Pacific (15:00 UTC)
  workflow_dispatch:       # lets you trigger it manually from GitHub

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance feedparser playwright homeharvest
          playwright install chromium
          playwright install-deps chromium

      - name: Run briefing
        run: python briefing.py

      - name: Publish
        run: |
          cp briefing.html index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.html index.html
          git diff --staged --quiet || git commit -m "Briefing $(date -u +'%Y-%m-%d')"
          git push
